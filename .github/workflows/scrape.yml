name: Scrape Events

on:
  schedule:
    - cron: '0 10 * * *'  # 6am ET (UTC-4 summer / UTC-5 winter)
  workflow_dispatch:       # allow manual runs from the Actions tab

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}

      - name: Cache scraper HTTP cache
        uses: actions/cache@v4
        with:
          path: scraper_cache.json
          key: scraper-cache-${{ github.run_id }}
          restore-keys: scraper-cache-

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      # Runs before the scrape so the fresh test status is folded into
      # scrape_health.json. Non-blocking (|| true) — a failing test still gets
      # recorded and surfaced on the dashboard, and shouldn't stop the daily
      # scrape. The "Surface test failures" step below turns the run red.
      - name: Run tests
        run: python3 scraper/run_tests.py || true

      - name: Run scraper
        run: python3 scraper/run_scraper.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/events.json data/archive.json data/scrape_health.json data/test_status.json
          git diff --staged --quiet || git commit -m "chore: update events [skip ci]"
          git push

      - name: Surface test failures
        run: |
          python3 -c "import json,sys; s=json.load(open('data/test_status.json')); sys.exit(1 if s.get('status')=='fail' else 0)"
