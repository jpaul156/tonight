<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tonight — Somerville &amp; Cambridge tonight</title>

  <link rel="icon" type="image/png" href="assets/favicon-32.png">
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="stars" aria-hidden="true"></div>

  <header class="header" id="header">
    <img src="assets/logo-wide-transparent.png" alt="Tonight" id="logo-img">
  </header>
  <div class="date-strip"><span class="date" id="today-date"></span></div>

  <div class="square-bar">
    <button class="square-indicator" id="square-indicator" aria-haspopup="dialog" aria-label="Change square"></button>
  </div>
  <nav class="filter-row category-row" id="category-filters" aria-label="Filter by category"></nav>

  <main class="event-list" id="event-list"></main>
  <p class="empty-state" id="empty-state" hidden>Nothing matches yet — try a different filter.</p>

  <footer class="footer">
    <p>Tonight · data refreshed nightly</p>
  </footer>

  <div class="metro-overlay" id="metro-overlay" hidden>
    <div class="metro-panel" role="dialog" aria-modal="true" aria-label="Choose a square">
      <button class="metro-close" id="metro-close" aria-label="Close">✕</button>
      <header class="metro-head">
        <p class="metro-kicker">Where to tonight?</p>
        <button class="metro-nearme" id="metro-nearme">
          <span class="line-dot line-dot-all"></span> Near me — show everything
        </button>
      </header>
      <div class="metro-stage" id="metro-stage">
        <canvas class="metro-canvas" id="metro-canvas"></canvas>
        <p class="metro-hint" id="metro-hint">Tap a lit-up station to ride there.</p>
      </div>
    </div>
  </div>

  <div class="detail-overlay" id="detail-overlay" hidden>
    <div class="detail-panel" role="dialog" aria-modal="true" aria-labelledby="detail-title">
      <button class="detail-close" id="detail-close" aria-label="Close">✕</button>
      <div class="detail-art" id="detail-art"></div>
      <div class="detail-body">
        <h2 class="detail-title" id="detail-title"></h2>
        <p class="card-time" id="detail-time"></p>
        <div class="detail-meta-row">
          <div class="transit-badge" id="detail-transit">
            <span class="transit-dot"></span>
            <span class="transit-text" id="detail-transit-text"></span>
          </div>
        </div>

        <p class="detail-description" id="detail-description"></p>

        <div class="venue-row">
          <div class="venue-avatar" id="detail-venue-avatar"></div>
          <div class="venue-info">
            <p class="venue-name" id="detail-venue-name"></p>
            <p class="venue-address" id="detail-venue-address"></p>
          </div>
        </div>

        <div class="detail-actions">
          <a class="btn btn-icon" id="detail-directions" target="_blank" rel="noopener" aria-label="Get directions" title="Get directions">
            <svg viewBox="0 0 24 24" aria-hidden="true"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg>
          </a>
          <button class="btn btn-icon" id="detail-calendar" aria-label="Add to calendar" title="Add to calendar">
            <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="12" y1="14" x2="12" y2="18"/><line x1="10" y1="16" x2="14" y2="16"/></svg>
          </button>
          <button class="btn btn-icon" id="detail-share" aria-label="Share" title="Share">
            <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
          </button>
          <a class="btn btn-primary" id="detail-tickets" target="_blank" rel="noopener" hidden>Buy tickets</a>
        </div>

        <div class="detail-more" id="more-venue" hidden>
          <h3>More from this venue</h3>
          <div class="more-list" id="more-venue-list"></div>
        </div>

        <div class="detail-more" id="more-performer" hidden>
          <h3 id="more-performer-heading">More from this artist</h3>
          <div class="more-list" id="more-performer-list"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
